[build]
  command = "corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/upsell run build"
  publish = "artifacts/upsell/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NPM_FLAGS = "--version"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
